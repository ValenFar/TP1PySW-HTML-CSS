<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto - Turismo Jujuy</title>
  <link rel="stylesheet" href="css/contactos.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

  <header class="header">
    <nav class="navbar">
      <a class="navbar_title" href="index.html">
        <img src="/img/EscudoProvincial.png" alt="Escudo Jujuy" class="navbar_logo">
      </a>
      <ul class="navbar_menu">
        <li><a href="agencias.html">Agencias</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="destinosprecios.html">Destinos</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </header>

  <section class="contacto">
    <form class="formulario" action="#">
      <h2>Contacto</h2>

      <div class="grupo">
        <input type="text" required>
        <label>Nombre completo</label>
      </div>

      <div class="grupo">
        <input type="text" required>
        <label>Apellido/s</label>
      </div>

      <div class="grupo">
        <input type="tel" required pattern="[0-9]{10}">
        <label>Número de teléfono</label>
      </div>

      <div class="grupo">
        <input type="email" required>
        <label>Correo Gmail</label>
      </div>

      <div class="grupo">
        <textarea required></textarea>
        <label>Mensaje</label>
      </div>

      <button type="submit" class="btn">Enviar</button>
      <div class="spinner"></div>
      <div class="modal"><p>Formulario enviado correctamente</p></div>
    </form>
  </section>

  <footer class="footer">
    <div class="footer-cont">

      <section class="footer-newsletter">
        <h2>Newsletter</h2>
        <p>Recibi ofertas, novedades y recomendaciones de viaje.</p>
        <form class="newsletter-form" action="#" method="post">
          <label for="newsletter-email">Correo electronico</label>
          <div>
            <input id="newsletter-email" type="email" name="email" placeholder="tuemail@ejemplo.com">
            <button type="submit">Suscribirme</button>
          </div>
        </form>
      </section>

      <section class="footer-social">
        <h2>Redes sociales</h2>
        <ul class="footer-icon">
          <li>
            <a href="#">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                <path d="M4 4m0 4a4 4 0 0 1 4 -4h8a4 4 0 0 1 4 4v8a4 4 0 0 1 -4 4h-8a4 4 0 0 1 -4 -4z"/>
                <path d="M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0"/>
                <path d="M16.5 7.5l0 .01"/>
              </svg>
              Instagram
            </a>
          </li>
          <li>
            <a href="#">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                <path d="M7 10v4h3v7h4v-7h3l1 -4h-4v-2a1 1 0 0 1 1 -1h3v-4h-3a5 5 0 0 0 -5 5v2h-3"/>
              </svg>
              Facebook
            </a>
          </li>
          <li>
            <a href="#">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                <path d="M3 21l1.65 -3.8a9 9 0 1 1 3.4 2.9l-5.05 .9"/>
                <path d="M9 10a.5 .5 0 0 0 1 0v-1a.5 .5 0 0 0 -1 0v1a5 5 0 0 0 5 5h1a.5 .5 0 0 0 0 -1h-1a.5 .5 0 0 0 0 1"/>
              </svg>
              WhatsApp
            </a>
          </li>
        </ul>
      </section>

      <section class="footer-map">
        <h2>Ubicacion</h2>
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4345.613978841019!2d-65.29557312387284!3d-24.18887858494738!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x941b0f5bca584281%3A0xb1d519d50cac526d!2sFacultad%20de%20Ingenier%C3%ADa%20-%20Universidad%20Nacional%20de%20Jujuy!5e1!3m2!1ses!2sar!4v1776134865984!5m2!1ses!2sar"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </section>

    </div>
  </footer>

</body>
</html>
